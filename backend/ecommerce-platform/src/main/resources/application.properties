spring.application.name=E-Commerce Platform

# --- DATABASE CONNECTION ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=postgres
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE SETTINGS ---
# Keep 'update' so your new 'role' column in the User entity syncs automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Specifically for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SECURITY / AUTH SETTINGS ---
# This ensures Spring doesn't try to use default basic auth prompts
spring.main.allow-bean-definition-overriding=true