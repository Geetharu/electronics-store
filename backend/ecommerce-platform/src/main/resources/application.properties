spring.application.name=E-Commerce Platform

# --- DATABASE CONNECTION ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SECURITY / AUTH SETTINGS ---
spring.main.allow-bean-definition-overriding=true

# --- CORS SETTINGS (For Deployment) ---
cors.allowed.origins=https://elite-electronics-store.vercel.app